{{- if .Values.qdrant.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "garbanzo.fullname" . }}-qdrant
  labels:
    {{- include "garbanzo.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "garbanzo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        {{- include "garbanzo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.qdrant.port }}
              protocol: TCP
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: {{ include "garbanzo.fullname" . }}-qdrant
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "garbanzo.fullname" . }}-qdrant
  labels:
    {{- include "garbanzo.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.qdrant.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "garbanzo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "garbanzo.fullname" . }}-qdrant
  labels:
    {{- include "garbanzo.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
{{- end }}
