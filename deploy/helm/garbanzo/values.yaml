image:
  repository: ghcr.io/jjhickman/garbanzo
  # Defaults to Chart.appVersion when empty.
  tag: ""

platform: discord
instanceId: ""

# Non-secret environment variables rendered directly into the container.
env: {}

# Secret environment variables. Use existingSecret to reference a pre-created
# Secret instead of rendering these values into a Helm-managed Secret.
secretEnv: {}
existingSecret: ""

# Discord defaults to ${DISCORD_HEALTH_PORT:-3002}. Use
# ${WHATSAPP_HEALTH_PORT:-3001} for WhatsApp,
# ${TELEGRAM_HEALTH_PORT:-3005} for Telegram, or
# ${MATRIX_HEALTH_PORT:-3004} for Matrix to match the compose profile ports.
healthPort: 3002

persistence:
  data:
    enabled: true
    size: 1Gi
    storageClass: ""
  whatsappAuth:
    enabled: false
    size: 100Mi

configFiles:
  groupsJson: ""
  discordChannelsJson: ""
  telegramChatsJson: ""
  matrixRoomsJson: ""
  bridgeMapJson: ""
  ragSourcesJson: ""

qdrant:
  enabled: false
  url: ""
  port: 6333

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 1Gi
    cpu: 1000m
