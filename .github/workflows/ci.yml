name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.0
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run quality checks
        env:
          MESSAGING_PLATFORM: whatsapp
          OWNER_JID: test_owner@s.whatsapp.net
          OPENROUTER_API_KEY: test_key_ci
          AI_PROVIDER_ORDER: openrouter
        run: npm run check

  postgres-backend:
    name: Postgres Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: garbanzo
          POSTGRES_PASSWORD: garbanzo
          POSTGRES_DB: garbanzo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U garbanzo -d garbanzo_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Initialize Postgres schema
        env:
          DATABASE_URL: postgres://garbanzo:garbanzo@127.0.0.1:5432/garbanzo_test
        run: npm run db:postgres:init

      - name: Run Postgres backend tests
        env:
          MESSAGING_PLATFORM: whatsapp
          OWNER_JID: test_owner@s.whatsapp.net
          OPENROUTER_API_KEY: test_key_ci
          AI_PROVIDER_ORDER: openrouter
          DATABASE_URL: postgres://garbanzo:garbanzo@127.0.0.1:5432/garbanzo_test
        run: npm run test:postgres

  vector-integration:
    name: Vector Integration (Qdrant)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c ':> /dev/tcp/127.0.0.1/6333'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Qdrant integration test
        env:
          MESSAGING_PLATFORM: whatsapp
          OWNER_JID: test_owner@s.whatsapp.net
          OPENROUTER_API_KEY: test_key_ci
          AI_PROVIDER_ORDER: openrouter
          QDRANT_URL: http://127.0.0.1:6333
          VECTOR_STORE: qdrant
          VECTOR_EMBEDDING_PROVIDER: deterministic
          VECTOR_EMBEDDING_DIMENSIONS: "256"
        run: npx vitest run tests/vector-memory-integration.test.ts

  pack-rehearsal:
    name: Pack Rehearsal (npm packaging)
    # BLOCKING — release gate for the npm packaging path (T6/D6): proves the
    # published tarball is self-contained using the real prepack build (tsc +
    # dist/.packaged sentinel). Installs the tarball into a temp prefix and
    # asserts: the bin symlink runs, doctor resolves mode=packaged +
    # home=$HOME/.garbanzo with no GARBANZO_HOME set (the mode-resolution
    # hard gate), non-interactive setup writes the quickstart file set, the
    # installed package boots to a 200 /health, and the service template ships.
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run pack rehearsal
        run: bash scripts/pack-rehearsal.sh

  smoke-experimental-platforms:
    name: smoke (experimental platforms)
    # Non-blocking this release (D5/T7): Windows/macOS support is
    # "experimental" until this job has run green long enough to flip to
    # required. Failures here must never hold up the release path.
    continue-on-error: true
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    defaults:
      run:
        # bash is available on GitHub-hosted windows-latest (via Git for
        # Windows) and macos-latest, so one script works across the matrix
        # instead of branching pwsh/bash per OS.
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Boot smoke test (HEALTH_ONLY)
        env:
          HEALTH_ONLY: "true"
          MESSAGING_PLATFORM: whatsapp
          OWNER_JID: test_owner@s.whatsapp.net
          OPENROUTER_API_KEY: test_key_ci
          AI_PROVIDER_ORDER: openrouter
          # No Docker/Qdrant available on these runners; keep boot fully
          # local (default HEALTH_PORT is 3001, src/utils/config/monitoring.ts).
          VECTOR_STORE: none
        run: |
          set -uo pipefail

          node dist/index.js &
          pid=$!
          echo "Started garbanzo (HEALTH_ONLY) pid=$pid"

          health_url="http://127.0.0.1:3001/health"
          success=0
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null "$health_url"; then
              echo "Health check succeeded on attempt $i"
              success=1
              break
            fi
            sleep 1
          done

          kill "$pid" 2>/dev/null || true
          wait "$pid" 2>/dev/null || true

          if [ "$success" -ne 1 ]; then
            echo "::error::/health never returned 200 within the retry budget" >&2
            exit 1
          fi

          echo "Boot smoke test passed"
