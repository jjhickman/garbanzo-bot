# docker-compose.dev.yml — Garbanzo (local dev override)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Purpose:
# - Enables local image builds for development.

services:
  garbanzo:
    image: garbanzo-local:${APP_VERSION:-dev}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}

    environment:
      - GARBANZO_VERSION=${APP_VERSION:-dev}

    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1:6333/readyz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  qdrant_data:
    name: garbanzo-bot-qdrant
