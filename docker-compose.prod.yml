# docker-compose.prod.yml — Garbanzo (production override)
#
# Usage:
#   APP_VERSION=0.1.8 docker compose -f docker-compose.yml -f docker-compose.prod.yml pull garbanzo
#   APP_VERSION=0.1.8 docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Purpose:
# - Disables local image builds so production always runs a tagged release image.

services:
  garbanzo:
    # Fail fast if APP_VERSION isn't provided.
    image: ghcr.io/jjhickman/garbanzo:${APP_VERSION:?APP_VERSION is required (e.g. 0.1.8)}

    # Ensure the tagged image is pulled even if present locally.
    pull_policy: always

    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1:6333/readyz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  qdrant_data:
    name: garbanzo-bot-qdrant
