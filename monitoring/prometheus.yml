# Prometheus config template for the garbanzo monitoring profile.
# The scrape token is written automatically at container start from the
# MONITORING_TOKEN in your .env. The prometheus service entrypoint in
# docker-compose.yml also renders the ${...} port placeholders below to
# /prometheus/prometheus.yml before starting Prometheus.

global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  # Prometheus scrapes every platform instance. If a profile is not running,
  # that instance intentionally appears as a down target (this is expected
  # for operators who don't run every platform, e.g. telegram is
  # permanently down for a discord-only or whatsapp-only deployment).
  - job_name: discord
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /prometheus/token
    static_configs:
      - targets: ["discord:${DISCORD_HEALTH_PORT:-3002}"]

  - job_name: whatsapp
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /prometheus/token
    static_configs:
      - targets: ["whatsapp:${WHATSAPP_HEALTH_PORT:-3001}"]

  - job_name: telegram
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /prometheus/token
    static_configs:
      - targets: ["telegram:${TELEGRAM_HEALTH_PORT:-3005}"]

  - job_name: matrix
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /prometheus/token
    static_configs:
      - targets: ["matrix:${MATRIX_HEALTH_PORT:-3004}"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:${PROMETHEUS_PORT:-9090}"]
